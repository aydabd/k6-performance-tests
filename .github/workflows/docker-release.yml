
name: Docker Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
  workflow_call:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/k6-template-influxdb-base:${{ env.RELEASE_TAG }} .
          docker push ghcr.io/${{ github.repository }}/k6-template-influxdb-base:${{ env.RELEASE_TAG }}

          docker build \
            --build-arg BASE_IMAGE_NAME=ghcr.io/${{ github.repository }}/k6-template-influxdb-base \
            --build-arg BASE_IMAGE_VERSION=${{ env.RELEASE_TAG }} \
            -t ghcr.io/${{ github.repository }}/simple-k6-test-template:${{ env.RELEASE_TAG }} \
            -f simple-k6-test-template/Dockerfile .
          docker push ghcr.io/${{ github.repository }}/simple-k6-test-template:${{ env.RELEASE_TAG }}
      - name: Update GitHub Release with Docker images
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          append_body: true
          body: |
            ## Docker Images

            - [`ghcr.io/${{ github.repository }}/k6-template-influxdb-base:${{ env.RELEASE_TAG }}`](https://ghcr.io/${{ github.repository }}/k6-template-influxdb-base)
            - [`ghcr.io/${{ github.repository }}/simple-k6-test-template:${{ env.RELEASE_TAG }}`](https://ghcr.io/${{ github.repository }}/simple-k6-test-template)
